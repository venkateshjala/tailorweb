<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .form-card { max-width: 600px; margin: 50px auto; border-radius: 15px; overflow: hidden; }
        .preview-container {
            width: 100%;
            height: 200px;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background-color: #f8f9fa;
            position: relative;
        }
        #img-preview { 
            max-height: 100%; 
            max-width: 100%; 
            display: none; 
            border-radius: 8px;
        }
        .form-control:focus { box-shadow: none; border-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="card form-card shadow">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0 text-center">Add New Product</h4>
        </div>
        <div class="card-body p-4">
            <form method="post" enctype="multipart/form-data" id="productForm">
                {% csrf_token %}

                <div class="preview-container">
                    <div id="placeholder-text" class="text-muted text-center">
                        <i class="bi bi-image" style="font-size: 2rem;"></i><br>
                        Image Preview
                    </div>
                    <img id="img-preview" src="#" alt="Preview">
                </div>

                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    
                    {% if field.name == "image" %}
                        <input type="file" name="{{ field.name }}" class="form-control" id="imageInput" accept="image/*">
                    {% else %}
                        {{ field }}
                    {% endif %}

                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Save Product</button>
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const imgPreview = document.getElementById('img-preview');
    const placeholderText = document.getElementById('placeholder-text');

    imageInput.onchange = evt => {
        const [file] = imageInput.files;
        if (file) {
            imgPreview.src = URL.createObjectURL(file);
            imgPreview.style.display = 'block';
            placeholderText.style.display = 'none';
        }
    };
</script>

</body>
</html>
