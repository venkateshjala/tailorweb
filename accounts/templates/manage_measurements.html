<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Assign Measurement</div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Product</label>
                            <select name="product" class="form-select">
                                {% for p in products %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Measurement Attribute</label>
                            <select name="measurement" class="form-select">
                                {% for m in measurements %}<option value="{{m.id}}">{{m.name}} ({{m.unit}})</option>{% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Display Order</label>
                            <input type="number" name="display_order" class="form-control" value="0">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="is_required" checked>
                            <label class="form-check-label">Is Required?</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Link Measurement</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h3>Product Measurement Mappings</h3>
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Measurement</th>
                        <th>Req.</th>
                        <th>Order</th>
                    </tr>
                </thead>
                <tbody>
                    {% for map in mappings %}
                    <tr>
                        <td><strong>{{ map.product.name }}</strong></td>
                        <td>{{ map.measurement.name }} <small class="text-muted">({{ map.measurement.unit }})</small></td>
                        <td>{% if map.is_required %}✅{% else %}❌{% endif %}</td>
                        <td>{{ map.display_order }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
