<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Measurement Master</h2>
                <button type="button" class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#addForm">
                    + Add New Attribute
                </button>
            </div>

            <div class="collapse mb-4" id="addForm">
                <div class="card card-body shadow-sm">
                    <form method="post" class="row g-3">
                        {% csrf_token %}
                        <div class="col-md-6">
                            <label class="form-label">Attribute Name</label>
                            {{ form.name }}
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Unit</label>
                            {{ form.unit }}
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-success w-100">Save</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Measurement Name</th>
                            <th>Unit of Measure</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in masters %}
                        <tr>
                            <td>{{ item.id }}</td>
                            <td><strong>{{ item.name }}</strong></td>
                            <td><span class="badge bg-info text-dark">{{ item.unit }}</span></td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center py-4">No attributes defined yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
